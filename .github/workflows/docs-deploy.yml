# Docs site → GitHub Pages（Public ミラー正本）
# Private の同名ファイルは雛形ではない。export は本ファイルを PUBLIC_DOCS_DEPLOY_YML として書き出す。
# 公開 URL: https://soundlabbittechnology.github.io/SLT-Design-System-public/

name: Docs site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Docs site
        env:
          DOCS_SITE: https://soundlabbittechnology.github.io
          DOCS_BASE: /SLT-Design-System-public/
        run: npm run docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
