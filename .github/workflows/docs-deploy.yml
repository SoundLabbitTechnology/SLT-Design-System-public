# Docs site の静的ホストへのデプロイ。
# 当面はローカル運用（npm run docs:dev）のため、main push では走らない。
# 公開を再開するときは workflow_dispatch で手動実行するか、push トリガーを戻す。
# 手順: docs/ROADMAP.md / site/README.md / Issue #28

name: Docs site

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Docs site
        env:
          # 公開再開時の候補値（ローカル運用中は未使用）
          DOCS_SITE: https://soundlabbittechnology.github.io
          DOCS_BASE: /SLT-Design-System-public/
        run: npm run docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
