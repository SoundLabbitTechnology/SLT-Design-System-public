# SLT Design System — isotc 憲法
# アーキテクチャ境界: トークン → スタイル → コンポーネント → ビルド

[[layers]]
name = "tokens"
basePath = "design-tokens/**"

[[layers]]
name = "styles"
basePath = "styles/**"

[[layers]]
name = "components"
basePath = "src/**"

[[layers]]
name = "scripts"
basePath = "scripts/**"

# 依存ルール: 内側レイヤーのみ参照可
[rules]
tokens = []
styles = ["tokens"]
components = ["tokens", "styles"]
scripts = ["tokens", "components", "styles"]

[steering]
codingStandards = "npm run check 必須。semantic トークンのみ参照。raw hex/px 禁止。"
technologyStack = "DTCG design-tokens, React, Storybook, Radix UI, Vitest"
designPrinciples = "L0原則 docs/L0-principles.md。danger ボタンは cancel と併置。CLAUDE.md を参照。"
